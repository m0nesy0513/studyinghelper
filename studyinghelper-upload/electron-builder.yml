appId: com.studyinghelper.app
productName: StudyingHelper
directories:
  buildResources: resources
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron/*'
  - '!node_modules'
  - '!**/*.md'
  - '!**/*.html'
  - '!**/.agents'
  - '!**/.codex'
  - '!**/.git'
  - '!**/.github'
win:
  target:
    - nsis
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.png
